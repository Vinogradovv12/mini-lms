<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LMS Project</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-body-tertiary">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

        <div class="container">

            <a class="navbar-brand fw-bold" href="{% if current_user %}/dashboard{% else %}/{% endif %}">

                🎓 LMS Platform

            </a>

            <div class="d-flex align-items-center gap-2">

                {% if current_user %}

                <span class="text-light small">

                    {{ current_user.username }}

                    <span class="badge bg-secondary">
                        {{ current_user.role.name }}
                    </span>

                </span>

                <a href="/dashboard" class="btn btn-outline-light">

                    Dashboard

                </a>

                {% if can_create_course %}

                <a href="/courses/create" class="btn btn-success">

                    Create Course

                </a>

                {% endif %}

                {% if current_user.is_admin%}

                <a href="/admin" class="btn btn-warning">

                    Admin

                </a>

                {% endif %}

                <a href="/logout" class="btn btn-danger">

                    Logout

                </a>

                {% else %}

                <a href="/login" class="btn btn-outline-light">

                    Login

                </a>

                <a href="/register" class="btn btn-primary">

                    Register

                </a>

                {% endif %}

            </div>

        </div>

    </nav>

    <main class="container py-4">

        {% block content %}
        {% endblock %}

    </main>

</body>
