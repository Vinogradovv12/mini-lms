{% extends "base.html" %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow">
                <div class="card-body">
                    <h2 class="mb-4">Edit Course</h2>
                    <p class="text-muted">Update course information.</p>
                    <form method="post" action="/courses/{{ course.id }}/edit">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text"
                                   name="title"
                                   class="form-control"
                                   value="{{ course.title }}"
                                   autocomplete="on"
                                   required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" rows="6" class="form-control" required>{{ course.description }}</textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning">Save</button>
                            <a href="/courses/{{ course.id }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
