{% extends "base.html" %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow">
                <div class="card-body p-5">
                    <h2 class="mb-4">Create Lesson</h2>
                    <p class="text-muted">
                        Course:
                        {{ course.title }}
                    </p>
                    <form method="post" action="/courses/{{ course.id }}/lessons/create">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text"
                                   name="title"
                                   class="form-control form-control-lg"
                                   required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Short Description</label>
                            <input type="text"
                                   name="description"
                                   class="form-control form-control-lg"
                                   required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Content</label>
                            <textarea name="content"
                                      rows="10"
                                      class="form-control form-control-lg"
                                      required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Create Lesson</button>
                    </form>
                    <a href="/courses/{{ course.id }}"
                       class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
