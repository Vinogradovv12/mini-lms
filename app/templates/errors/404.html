{% extends "base.html" %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center min-vh-75 py-5">
    <div class="text-center col-md-6 col-lg-5">
        <h1 class="display-1 fw-bold text-primary mb-0">404</h1>
        <h2 class="h4 fw-semibold text-dark my-3">Page Not Found</h2>
        
        <p class="text-secondary mb-4">
            {{ message if message else "Oops! The page you are looking for does not exist or has been moved." }}
        </p>
        
        <a href="/" class="btn btn-primary px-4 py-2 shadow-sm fw-medium">
            Back to Homepage
        </a>
    </div>
</div>
{% endblock %}
