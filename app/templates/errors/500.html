{% extends "base.html" %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center min-vh-75 py-5">
    <div class="text-center col-md-6 col-lg-5">
        <h1 class="display-1 fw-bold text-danger mb-0">500</h1>
        <h2 class="h4 fw-semibold text-dark my-3">Internal Server Error</h2>
        
        <p class="text-secondary mb-4">
            {{ message if message else "Something went wrong on our end. We are already working to fix it. Please try again later." }}
        </p>
        
        <a href="/" class="btn btn-danger px-4 py-2 shadow-sm fw-medium">
            Back to Homepage
        </a>
    </div>
</div>
{% endblock %}
