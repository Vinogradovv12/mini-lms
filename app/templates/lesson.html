{% extends "base.html" %}
{% block content %}
    <div class="mb-4">
        <a href="/courses/{{ course.id }}" class="btn btn-outline-secondary">Back to Course</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="mb-3">{{ lesson.title }}</h1>
            <div class="d-flex flex-wrap gap-3 mb-3">
                <span class="badge bg-primary">Lesson</span>
                <span class="badge bg-secondary">{{ course.title }}</span>
            </div>
            <hr>
            <div class="lh-lg" style="white-space: pre-line;">{{ lesson.content }}</div>
        </div>
    </div>
    <hr>
    <div class="d-flex justify-content-between">
        <a href="/courses/{{ course.id }}" class="btn btn-outline-secondary">Back to Course</a>
        <a href="/dashboard" class="btn btn-outline-primary">Dashboard</a>
    </div>
{% endblock %}
