{% extends "base.html" %}

{% block content %}

<div class="mb-4">

    <a
        href="/courses/{{ course.id }}"
        class="btn btn-outline-secondary">

        Back to Course

    </a>

</div>

<div class="card shadow-sm">

    <div class="card-body">

        <h1 class="mb-3">
            {{ lesson.title }}
        </h1>

        <p class="text-muted">

            Course:
            {{ course.title }}

        </p>

        <hr>

        <div class="mt-4">

            <p style="white-space: pre-line;">

                {{ lesson.content }}

            </p>

        </div>

    </div>

</div>

{% endblock %}
