{% extends "base.html" %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow">
                <div class="card-body p-5">
                    <h2 class="mb-4">Create course</h2>
                    <p class="text-muted mb-4">Create a new course and start adding lessons.</p>
                    <form method="post" action="/courses/create">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text"
                                   name="title"
                                   class="form-control form-control-lg"
                                   autocomplete="on"
                                   required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description"
                                      class="form-control form-control-lg"
                                      rows="5"
                                      required></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Create Course</button>
                        <a href="/dashboard" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
